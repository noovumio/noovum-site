<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noovum Technologies</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f0f0f;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

    /* Imagen responsiva */
    .image-box {
      width: 100%;
      max-width: 95%; /* ajusta el ancho máximo */
      margin-bottom: 30px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      border: 2px solid #1f1f1f;
    }

    .image-box img {
      width: 100%;
      height: auto;
      object-fit: contain;
      background-color: #0f0f0f; /* relleno oscuro para que no se vea vacío */
      display: block;
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    p {
      color: #bbbbbb;
      max-width: 500px;
    }

    footer {
      background: #111111;
      padding: 20px;
      text-align: center;
      font-size: 14px;
      border-top: 1px solid #222;
      line-height: 1.8;
    }

    footer a {
      color: #4da3ff;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="image-box">
      <!-- Cambia por tu imagen -->
      <img src="assets/cover_image.png" alt="Imagen principal">
    </div>

    <h1>Noovum Technologies</h1>
    <p>
      Bienvenido a Noovum Technologies. Soluciones de ciberseguridad y tecnología para empresas modernas.
    </p>
  </div>

  <footer>
    📧 Correo: <a href="mailto:hola@noovum.io">hola@noovum.io</a> |
    📞 Teléfono: +51 987 293 537 |
    📍 Dirección: Jr. Marginal de la Selva 565 #302, Santiago de Surco, Lima<br>
    🔗 LinkedIn: <a href="https://www.linkedin.com/company/noovumtech" target="_blank">Noovum Tech</a>
  </footer>

</body>
</html>
